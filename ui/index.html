<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CAPT Committee Q&A Portal — Login</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="login-screen">
  <div class="login-card" role="main">
    <h1>CAPT Committee Q&A Portal</h1>
    <p>Answer questions from your Telebot users.</p>

    <form action="dashboard.html" method="get" aria-label="Login form">
      <div class="form-row">
        <label for="email">Email</label>
        <input id="email" name="email" type="email" placeholder="you@capt.sg" required autocomplete="username" />
      </div>
      <div class="form-row">
        <label for="password">Password</label>
        <input id="password" name="password" type="password" placeholder="●●●●●●●●" required autocomplete="current-password" />
      </div>

      <div class="form-actions">
        <label class="remember">
          <input type="checkbox" name="remember" checked />
          Remember Me
        </label>
        <a href="#">Forgot Password?</a>
      </div>

      <button class="login-btn" type="submit">Login</button>
    </form>
  </div>
</body>
</html>
